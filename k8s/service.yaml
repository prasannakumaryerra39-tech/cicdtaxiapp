apiVersion: v1
kind: Service
metadata:
  name: taxi-booking-service
  namespace: taxi
spec:
  type: LoadBalancer
  selector:
    app: taxi-booking
  ports:
    - protocol: TCP
      port: 8001
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus-grafana
  namespace: monitoring
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/instance: prometheus
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus-fixed
  namespace: monitoring
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: prometheus
    prometheus: prometheus-kube-prometheus-prometheus
  ports:
    - name: web
      port: 9090
      targetPort: web

